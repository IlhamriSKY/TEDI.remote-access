# Phase 1: HTTP only, just enough for the certbot --webroot ACME challenge.
# Replaced by remote.ilhamriski.com.conf once the cert exists.
server {
    listen      80;
    listen      [::]:80;
    server_name remote.ilhamriski.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
