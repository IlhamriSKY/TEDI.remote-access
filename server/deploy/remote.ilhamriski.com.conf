# remote.ilhamriski.com — TEDI remote-access relay.
# TLS-terminate WSS/HTTPS and proxy to the Node relay on 127.0.0.1:8788.
# Mirrors the wss-dashboard.ilhamriski.com pattern (Laravel Reverb gateway).

server {
    listen      80;
    listen      [::]:80;
    server_name remote.ilhamriski.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://remote.ilhamriski.com$request_uri;
    }
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name remote.ilhamriski.com;

    ssl_certificate     /etc/letsencrypt/live/remote.ilhamriski.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remote.ilhamriski.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "no-referrer"                          always;

    access_log /var/log/nginx/remote.ilhamriski.com-access.log main;
    error_log  /var/log/nginx/remote.ilhamriski.com-error.log;

    # Compress the JS/CSS/JSON bundle (fonts + woff2 are already compressed).
    gzip            on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/css text/plain text/javascript application/javascript application/json image/svg+xml;

    # WebSocket: long-lived, no buffering.
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_read_timeout      7d;
    proxy_send_timeout      7d;
    keepalive_timeout       75;
    client_max_body_size    1m;

    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
