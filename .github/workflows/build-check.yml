name: Build check

# Guards the source: the browser client must typecheck + build, the extension
# bundle must build from src/ and be valid JS (extension.js is the generated
# bundle, NOT committed — same convention as the other extensions), the relay
# must be valid JS, and the Rust agent must compile.

on:
  push:
    branches: ["**"]
    paths:
      - "client/**"
      - "sidecar-src/**"
      - "src/**"
      - "build.mjs"
      - "package.json"
      - "package-lock.json"
      - "manifest.json"
      - "server/server.js"
  pull_request:
  workflow_dispatch:

jobs:
  client:
    name: Client + scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Build browser client
        working-directory: client
        run: |
          npm ci
          npm run typecheck
          npm run build
      - name: Build extension.js from src/ + syntax-check relay
        run: |
          npm ci
          node build.mjs
          node --check extension.js
          node --check server/server.js

  agent:
    name: Agent compiles
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check
        working-directory: sidecar-src
        run: cargo check
