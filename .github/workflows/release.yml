name: Release

# Tag-triggered release (`vX.Y.Z`):
#   1. build the `tedi-remote-agent` sidecar for all three OSes TEDI supports
#      (Windows, macOS x64 + arm64, Linux x64)
#   2. verify the browser SPA still builds (it is NOT shipped pre-built)
#   3. package the installable extension .zip (TEDI reads it from
#      releases/latest) AND a relay+website SOURCE bundle (.tar.gz) the deployer
#      builds from (see README "Self-host the relay")
#   4. upload both to the GitHub release
#
# The agent uses OS-native TLS (SChannel / Secure Transport / OpenSSL). On Linux
# OpenSSL is vendored (Cargo.toml) so no system libssl is needed at build or run.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required when running manually."
        required: true

permissions:
  contents: write

jobs:
  build-agent:
    name: Build agent (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            sidecar_dir: windows-x86_64
            exe_suffix: ".exe"
          - target: x86_64-apple-darwin
            runner: macos-latest
            sidecar_dir: macos-x86_64
            exe_suffix: ""
          - target: aarch64-apple-darwin
            runner: macos-latest
            sidecar_dir: macos-aarch64
            exe_suffix: ""
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            sidecar_dir: linux-x86_64
            exe_suffix: ""
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar-src/target
          key: agent-${{ matrix.target }}-${{ hashFiles('sidecar-src/Cargo.lock', 'sidecar-src/Cargo.toml') }}
      - name: Build agent (release)
        working-directory: sidecar-src
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage/${{ matrix.sidecar_dir }}
          cp "sidecar-src/target/${{ matrix.target }}/release/tedi-remote-agent${{ matrix.exe_suffix }}" \
             "stage/${{ matrix.sidecar_dir }}/tedi-remote-agent${{ matrix.exe_suffix }}"
          ls -la stage/${{ matrix.sidecar_dir }}
      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.sidecar_dir }}
          path: stage/${{ matrix.sidecar_dir }}
          if-no-files-found: error

  release:
    name: Package + release
    runs-on: ubuntu-latest
    needs: build-agent
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20

      # Verify the website still builds. The build output is NOT shipped — the
      # relay bundle carries client/ source and the deployer builds it (README).
      - name: Verify browser client builds
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag"          >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}"  >> "$GITHUB_OUTPUT"

      - name: Verify manifest.json version matches the tag
        run: |
          set -euo pipefail
          mver=$(jq -r '.version' manifest.json)
          if [ "$mver" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::manifest.json version ($mver) does not match tag (${{ steps.ver.outputs.version }})"
            exit 1
          fi

      - name: Download agent artifacts
        uses: actions/download-artifact@v4
        with:
          path: sidecar
          pattern: sidecar-*
          merge-multiple: false

      - name: Flatten sidecar layout
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for dir in sidecar/sidecar-*; do
            mv "$dir" "sidecar/${dir#sidecar/sidecar-}"
          done
          ls -R sidecar

      - name: Package extension + relay
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ver="${{ steps.ver.outputs.version }}"
          ext="dist/tedi.remote-access-${ver}.zip"
          zip -r "$ext" manifest.json extension.js icon.png README.md CHANGELOG.md LICENSE sidecar
          # Relay + website SOURCE bundle, as .tar.gz (NOT .zip) so the extension
          # .zip stays the only .zip asset — TEDI's installer picks the first .zip
          # in the release. We ship the website source (client/) and the relay
          # (server/), NOT a pre-built UI; the deployer builds it per README.
          relay="dist/tedi-remote-relay-${ver}.tar.gz"
          tar -czf "$relay" \
            --exclude='node_modules' \
            --exclude='server/public' \
            client server README.md CHANGELOG.md LICENSE
          unzip -l "$ext"
          echo "ext=$ext"     >> "$GITHUB_OUTPUT"
          echo "relay=$relay" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.ext }}
            ${{ steps.pkg.outputs.relay }}
